server.port=80
server.error.include-stacktrace=never

# Configuración MySQL (Sliplane)
spring.datasource.url=jdbc:mysql://mysql-albarr.internal:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Secreto JWT desde variable de entorno (no queda en el repo)
app.jwt.secret=${JWT_SECRET}

spring.main.lazy-initialization=true
